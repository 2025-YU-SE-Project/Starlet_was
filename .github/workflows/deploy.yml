name: CI/CD Pipeline

on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write # Docker Hub에 이미지 푸시를 위한 권한 추가
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x Starlet_BE/gradlew

      - name: Build with Gradle
        run: cd Starlet_BE && ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./Starlet_BE
          file: ./Starlet_BE/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/starlet:amd64
          platforms: linux/amd64

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/starlet
            # 기존 컨테이너 중지 및 삭제
            docker-compose down
            # 최신 이미지 강제 풀
            docker-compose pull app
            # 새로운 컨테이너 시작
            docker-compose up -d --no-deps app
            # 사용하지 않는 이미지 정리
            docker image prune -f
