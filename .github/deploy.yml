name: CI/CD Pipeline

on:
  push:
    branches:
      - develop  # develop 브랜치에 푸시가 발생하면 실행

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 체크아웃: 저장소 코드를 워크플로우 환경으로.
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 애플리케이션 빌드: Gradle을 사용해 애플리케이션을 빌드.
      - name: Build with Gradle
        run: ./gradlew build

      # 5. Docker 이미지 빌드 및 도커 허브에 푸시
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/starlet:amd64 # amd64 아키텍처 명시
          platforms: linux/amd64 # EC2에 맞는 아키텍처로 빌드

      # 6. EC2 서버에 SSH 접속 및 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }} # EC2 퍼블릭 IP 주소
          username: ubuntu # EC2 사용자 이름
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 서버에 접속해서 실행할 명령어
            cd /home/ubuntu/my-app # 프로젝트 폴더로 이동
            docker-compose pull app # 최신 이미지 가져오기
            docker-compose up -d --no-deps app # app 서비스만 재시작
            docker image prune -f # 오래된 이미지 정리
