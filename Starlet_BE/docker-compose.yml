services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=root # root 계정으로 접속하도록 명시
      - SPRING_DATASOURCE_PASSWORD=${DB_ROOT_PASSWORD} # root 계정의 비밀번호 변수
      - SECRET_KEY=${SECRET_KEY}
      - VERIFY_EMAIL=${VERIFY_EMAIL}
      - VERIFY_PASSWORD=${VERIFY_PASSWORD}
      - APP_FRONTEND_BASE_URL=${APP_FRONTEND_BASE_URL}
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=se_star
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    command: mysqld

volumes:
  db-data: