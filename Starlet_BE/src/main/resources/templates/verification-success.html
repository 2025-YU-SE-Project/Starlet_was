<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlet - 인증 완료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, rgba(147, 112, 219, 1), rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px rgba(147, 112, 219, 0.7));
            animation: shooting-star-animation 5s linear infinite;
        }

        @keyframes shooting-star-animation {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
            100% { transform: translateX(-100vw) translateY(100vh) rotate(45deg); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .card h1 {
            font-size: 2.5em;
            margin-top: 0;
            font-weight: 700;
            color: #9370DB; /* MediumPurple */
            text-shadow: 0 0 10px #9370DB, 0 0 20px #9370DB;
        }

        .card .message {
            font-size: 1.2em;
            font-weight: 300;
            line-height: 1.6;
        }

        .card .subtext {
            margin-top: 30px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
<div class="star-field" id="star-field"></div>
<div class="card">
    <h1 th:text="${title}">✨ 인증 완료</h1>
    <p class="message" th:text="${message}">메일 인증이 완료되었습니다. Starlet의 세계에 오신 것을 환영합니다.</p>
    <p class="subtext">이제 이 창을 닫고 여정을 계속하세요.</p>
</div>

<script>
    const starField = document.getElementById('star-field');
    const numStars = 200;
    const numShootingStars = 3;

    for (let i = 0; i < numStars; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.animationDuration = `${Math.random() * 2 + 1}s`;
        star.style.animationDelay = `${Math.random()}s`;
        starField.appendChild(star);
    }

    for (let i = 0; i < numShootingStars; i++) {
        const shootingStar = document.createElement('div');
        shootingStar.className = 'shooting-star';
        shootingStar.style.top = `${Math.random() * 50}%`;
        shootingStar.style.right = `${-100 - Math.random() * 300}px`;
        const duration = Math.random() * 3 + 2;
        shootingStar.style.animationDuration = `${duration}s`;
        shootingStar.style.animationDelay = `${Math.random() * 5}s`;
        shootingStar.style.width = `${Math.random() * 100 + 100}px`;
        starField.appendChild(shootingStar);
    }
</script>
</body>
</html>
